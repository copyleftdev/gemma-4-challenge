<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc">
  <title id="title">Care Compass DEV.to cover image</title>
  <desc id="desc">A clinical architecture cover for Care Compass, pairing Gemma 4 with signed Aion policy evidence.</desc>
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#c5d6d2" stroke-width="1" opacity="0.45"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#1a2c35" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f756f"/>
    </marker>
    <style>
      .bg { fill: #f5f8f7; }
      .panel { fill: #fbfdfb; stroke: #b8ccc7; stroke-width: 1.4; filter: url(#shadow); }
      .source { fill: #e8f3ef; stroke: #80aaa0; stroke-width: 1.4; }
      .aion { fill: #dff0e8; stroke: #2d8074; stroke-width: 1.6; }
      .gemma { fill: #e5eef7; stroke: #5f8fc1; stroke-width: 1.4; }
      .record { fill: #f8ecd2; stroke: #c69231; stroke-width: 1.4; }
      .ink { fill: #172735; }
      .muted { fill: #536a73; }
      .teal { fill: #1f756f; }
      .blueText { fill: #285c9f; }
      .amberText { fill: #98620f; }
      .label { font: 800 12px Archivo, Aptos, Segoe UI, sans-serif; letter-spacing: 0.08em; }
      .title { font: 800 58px Archivo, Aptos, Segoe UI, sans-serif; }
      .subtitle { font: 600 25px Archivo, Aptos, Segoe UI, sans-serif; }
      .body { font: 500 17px Archivo, Aptos, Segoe UI, sans-serif; }
      .node { font: 800 20px Archivo, Aptos, Segoe UI, sans-serif; }
      .small { font: 600 13px Archivo, Aptos, Segoe UI, sans-serif; }
      .line { fill: none; stroke: #1f756f; stroke-width: 2.4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" width="1000" height="420"/>
  <rect width="1000" height="420" fill="url(#grid)" opacity="0.7"/>

  <g transform="translate(58 56)">
    <text x="0" y="0" class="label teal">GEMMA 4 CHALLENGE BUILD</text>
    <text x="0" y="64" class="title ink">Care Compass</text>
    <text x="0" y="112" class="subtitle ink">Local healthcare navigation</text>
    <text x="0" y="144" class="subtitle ink">with signed policy evidence</text>
    <text x="0" y="198" class="body muted">Gemma 4 does the language work.</text>
    <text x="0" y="224" class="body muted">Aion proves why the answer was allowed.</text>
  </g>

  <rect x="592" y="54" width="350" height="312" rx="22" class="panel"/>
  <text x="626" y="94" class="label teal">DECISION CHAIN</text>

  <g transform="translate(626 124)">
    <rect width="264" height="54" rx="13" class="source"/>
    <text x="18" y="34" class="node ink">Community request</text>
  </g>

  <g transform="translate(626 206)">
    <rect width="118" height="72" rx="13" class="aion"/>
    <text x="16" y="30" class="node ink">Aion</text>
    <text x="16" y="52" class="small teal">signed gate</text>
  </g>

  <g transform="translate(772 206)">
    <rect width="118" height="72" rx="13" class="gemma"/>
    <text x="16" y="30" class="node ink">Gemma 4</text>
    <text x="16" y="52" class="small blueText">local model</text>
  </g>

  <g transform="translate(626 306)">
    <rect width="264" height="44" rx="13" class="record"/>
    <text x="18" y="29" class="node ink">Forensic decision record</text>
  </g>

  <path class="line" d="M758 178 V196"/>
  <path class="line" d="M744 242 H760"/>
  <path class="line" d="M831 278 V296"/>
</svg>
