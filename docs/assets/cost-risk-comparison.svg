<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="980" viewBox="0 0 1440 980" role="img" aria-labelledby="title desc">
  <title id="title">Cost and crisis comparison for governed healthcare AI</title>
  <desc id="desc">A side-by-side comparison of conventional middleware-heavy healthcare AI and the Care Compass signed-policy architecture.</desc>
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#c5d6d2" stroke-width="1" opacity="0.42"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1a2c35" flood-opacity="0.13"/>
    </filter>
    <style>
      .bg { fill: #f5f8f7; }
      .panel { fill: #fbfdfb; stroke: #b8ccc7; stroke-width: 1.4; filter: url(#shadow); }
      .legacy { fill: #f8dfd8; stroke: #c86b55; stroke-width: 1.4; }
      .care { fill: #dff0e8; stroke: #2d8074; stroke-width: 1.5; }
      .neutral { fill: #e8f3ef; stroke: #b8ccc7; stroke-width: 1.2; }
      .amber { fill: #f8ecd2; stroke: #c69231; stroke-width: 1.4; }
      .blue { fill: #e5eef7; stroke: #5f8fc1; stroke-width: 1.4; }
      .ink { fill: #172735; }
      .muted { fill: #536a73; }
      .teal { fill: #1f756f; }
      .blueText { fill: #285c9f; }
      .amberText { fill: #98620f; }
      .coralText { fill: #a54e3f; }
      .title { font: 800 42px Archivo, Aptos, Segoe UI, sans-serif; }
      .subtitle { font: 500 18px Archivo, Aptos, Segoe UI, sans-serif; }
      .label { font: 800 13px Archivo, Aptos, Segoe UI, sans-serif; letter-spacing: 0.08em; }
      .head { font: 800 21px Archivo, Aptos, Segoe UI, sans-serif; }
      .body { font: 500 15px Archivo, Aptos, Segoe UI, sans-serif; }
      .small { font: 500 13px Archivo, Aptos, Segoe UI, sans-serif; }
      .metric { font: 800 28px Archivo, Aptos, Segoe UI, sans-serif; }
      .rule { stroke: #b8ccc7; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="980"/>
  <rect width="1440" height="980" fill="url(#grid)" opacity="0.62"/>

  <text x="72" y="78" class="title ink">Cost and Crisis Delta</text>
  <text x="72" y="112" class="subtitle muted">Planning view for judges: where the conventional stack spends money and where the Care Compass pattern removes work.</text>
  <text x="72" y="147" class="small muted">Illustrative estimates only. They are not procurement quotes and exclude internal staff salary, legal review, and production hardening.</text>

  <rect x="72" y="188" width="614" height="650" rx="22" class="panel"/>
  <rect x="754" y="188" width="614" height="650" rx="22" class="panel"/>

  <text x="108" y="232" class="label coralText">CONVENTIONAL MIDDLEWARE APPROACH</text>
  <text x="790" y="232" class="label teal">CARE COMPASS GOVERNED LOCAL APPROACH</text>

  <g transform="translate(108 276)">
    <rect width="542" height="114" rx="16" class="legacy"/>
    <text x="26" y="38" class="metric ink">$8k-$45k+/mo</text>
    <text x="26" y="68" class="body muted">Model gateway, vector DB, audit logging, monitoring,</text>
    <text x="26" y="92" class="body muted">policy services, cloud security controls, support tooling.</text>
  </g>

  <g transform="translate(790 276)">
    <rect width="542" height="114" rx="16" class="care"/>
    <text x="26" y="38" class="metric ink">$0-$500/mo pilot</text>
    <text x="26" y="68" class="body muted">Local Docker app, local Ollama, signed Aion files,</text>
    <text x="26" y="92" class="body muted">low variable cost after hardware and first download.</text>
  </g>

  <g transform="translate(108 424)">
    <rect width="542" height="86" rx="14" class="amber"/>
    <text x="24" y="34" class="head ink">Policy Drift</text>
    <text x="24" y="60" class="body muted">Rules live across prompts, configs, tickets, and docs.</text>
  </g>

  <g transform="translate(790 424)">
    <rect width="542" height="86" rx="14" class="care"/>
    <text x="24" y="34" class="head ink">Signed Source of Truth</text>
    <text x="24" y="58" class="body muted">Runtime verifies the exact `.aion` policy artifacts</text>
    <text x="24" y="78" class="body muted">before decisions.</text>
  </g>

  <g transform="translate(108 530)">
    <rect width="542" height="86" rx="14" class="legacy"/>
    <text x="24" y="34" class="head ink">Jailbreak or Unsafe Medical Request</text>
    <text x="24" y="60" class="body muted">The model may see the request before policy has a final say.</text>
  </g>

  <g transform="translate(790 530)">
    <rect width="542" height="86" rx="14" class="care"/>
    <text x="24" y="34" class="head ink">Pre-Model Gate</text>
    <text x="24" y="58" class="body muted">Escalation, medication, PHI, and jailbreak signals</text>
    <text x="24" y="78" class="body muted">block Gemma before generation.</text>
  </g>

  <g transform="translate(108 636)">
    <rect width="542" height="86" rx="14" class="legacy"/>
    <text x="24" y="34" class="head ink">Audit Request</text>
    <text x="24" y="60" class="body muted">Reviewers reconstruct context from logs, screenshots, and tickets.</text>
  </g>

  <g transform="translate(790 636)">
    <rect width="542" height="86" rx="14" class="care"/>
    <text x="24" y="34" class="head ink">Forensic Decision Record</text>
    <text x="24" y="58" class="body muted">Policy hashes, selected rule, prompt hash,</text>
    <text x="24" y="78" class="body muted">and output hash are captured.</text>
  </g>

  <g transform="translate(108 742)">
    <rect width="542" height="62" rx="14" class="neutral"/>
    <text x="24" y="38" class="body ink">Time to answer "why": <tspan class="coralText">hours to days</tspan></text>
  </g>

  <g transform="translate(790 742)">
    <rect width="542" height="62" rx="14" class="neutral"/>
    <text x="24" y="38" class="body ink">Time to answer "why": <tspan class="teal">seconds to minutes</tspan></text>
  </g>

  <rect x="72" y="874" width="1296" height="74" rx="18" fill="#e8f3ef" stroke="#b8ccc7"/>
  <text x="104" y="912" class="head ink">Crisis comparison:</text>
  <text x="314" y="912" class="body muted">the conventional stack spends after an incident to prove context; Care Compass makes context an output of every decision.</text>
</svg>
