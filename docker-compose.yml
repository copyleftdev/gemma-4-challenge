services:
  care-compass:
    build: .
    ports:
      - "${CARE_COMPASS_PORT:-8080}:8080"
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      CARE_COMPASS_MODEL: ${CARE_COMPASS_MODEL:-gemma4:e2b}
      OLLAMA_HOST: ${CARE_COMPASS_OLLAMA_HOST:-http://ollama:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
